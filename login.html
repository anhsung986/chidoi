<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Hệ Thống</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #0b0f19;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: #111827;
            padding: 40px; border-radius: 16px;
            width: 90%; max-width: 380px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 8px; border: 1px solid #374151;
            background: #1f2937; color: white;
        }
        button {
            width: 100%; padding: 12px; margin-top: 15px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            border: none; border-radius: 8px; color: white;
            font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>ĐĂNG NHẬP</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Tên đăng nhập" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <button type="submit">Vào Hệ Thống</button>
        </form>
    </div>

    <!-- Nhúng thư viện Firebase cấu hình của bạn -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB0EJxNNis2NB-JjsiihieWVzFYwsgvRi8",
            authDomain: "chidoi.firebaseapp.com",
            databaseURL: "https://chidoi-default-rtdb.firebaseio.com",
            projectId: "chidoi",
            storageBucket: "chidoi.appspot.com",
            messagingSenderId: "523119718926",
            appId: "1:523119718926:web:2dcdd49145b01755ed825f",
            measurementId: "G-RFKJHW3S97"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Kiểm tra tài khoản trên Database
            database.ref('users/' + user).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.password === pass) {
                        alert("Đăng nhập thành công! Chào mừng " + user);
                        
                        // LƯU TRẠNG THÁI ĐĂNG NHẬP CHUẨN
                        localStorage.setItem("loggedInUser", user);
                        
                        // CHUYỂN HƯỚNG SANG HOME.HTML
                        window.location.href = "home.html";
                    } else {
                        alert("Mật khẩu nhập chưa đúng!");
                    }
                } else {
                    alert("Tài khoản này không tồn tại!");
                }
            }).catch((error) => {
                alert("Lỗi kết nối: " + error.message);
            });
        });
    </script>
</body>
</html>
