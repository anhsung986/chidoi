<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Đăng Nhập - Chidoi</title>
</head>
<body>
    <div class="welcome-container">
        <h1 class="logo">LOGIN</h1>
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Tên đăng nhập" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <button type="submit" class="btn">Xác Nhận Đăng Nhập</button>
        </form>
        
        <p style="margin-top: 25px;">
            Chưa có tài khoản? <a href="register.html" style="font-weight: bold; color: #00ffff;">Đăng ký ngay</a>
        </p>
        <p style="margin-top: 10px;">
            <a href="index.html">← Quay lại trang chủ</a>
        </p>
    </div>

<!-- Nhúng thư viện Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // CẤU HÌNH FIREBASE CHÍNH XÁC CỦA BẠN
    const firebaseConfig = {
        apiKey: "AIzaSyB0EJxNNis2NB-JjsiihieWVzFYwsgvRi8",
        authDomain: "chidoi.firebaseapp.com",
        databaseURL: "https://chidoi-default-rtdb.firebaseio.com",
        projectId: "chidoi",
        storageBucket: "chidoi.appspot.com",
        messagingSenderId: "523119718926",
        appId: "1:523119718926:web:2dcdd49145b01755ed825f",
        measurementId: "G-RFKJHW3S97"
    };
    
    // Khởi tạo Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Tài khoản admin dự phòng cứng
        if (user === "admin" && pass === "123456") {
            alert("Đăng nhập thành công với quyền Admin!");
             
       // Đảm bảo có dòng này để truyền tên user qua trang home:
            localStorage.setItem("loggedInUser", user); 
            
            window.location.href = "home.html";
            return;
        }

        // Tìm tài khoản trên Database
        database.ref('users/' + user).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const userData = snapshot.val();
                
                // So khớp mật khẩu
                if (userData.password === pass) {
                    alert("Đăng nhập thành công! Chào mừng " + user);
                    window.location.href = "index.html";
                } else {
                    alert("Mật khẩu nhập chưa đúng!");
                }
            } else {
                alert("Tài khoản này không tồn tại trên hệ thống!");
            }
        }).catch((error) => {
            alert("Lỗi kết nối Database: " + error.message);
        });
    });
</script>
    
</body>
</html>
