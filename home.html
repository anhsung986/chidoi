<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trang Chủ Hệ Thống - Cầu Vồng</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0; padding: 0; box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    /* NỀN TỐI ĐỂ LÀM NỔI BẬT ĐÈN LED CẦU VỒNG */
    body {
        background-color: #0b0f19;
        min-height: 100vh;
        display: flex; justify-content: center; align-items: center;
        overflow: hidden;
    }

    /* --- MENU BTN --- */
    .menu-btn {
        position: absolute; top: 25px; left: 25px;
        width: 45px; height: 45px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px; cursor: pointer;
        display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        z-index: 100; transition: 0.3s;
    }
    .menu-btn:hover { background: rgba(255, 255, 255, 0.15); }
    .menu-btn span {
        display: block; width: 22px; height: 3px;
        background: white; border-radius: 2px; transition: 0.3s;
    }
    .menu-btn.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .menu-btn.active span:nth-child(2) { opacity: 0; }
    .menu-btn.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* --- SIDEBAR --- */
    .sidebar {
        position: fixed; top: 0; left: -260px;
        width: 260px; height: 100%;
        background: rgba(11, 15, 25, 0.9);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        box-shadow: 5px 0 25px rgba(0,0,0,0.5);
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 99; padding-top: 90px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
    }
    .sidebar.active { left: 0; }
    .sidebar a {
        display: block; padding: 16px 28px;
        color: #eee; text-decoration: none;
        font-weight: 500; font-size: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.3s;
    }
    .sidebar a:hover {
        background: linear-gradient(45deg, #ff0000, #00ffd5, #7a00ff);
        color: white; padding-left: 35px;
    }

    .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        display: none; z-index: 98;
    }
    .overlay.active { display: block; }

    /* --- MAIN CONTAINER KHUNG VIỀN CẦU VỒNG LED CHẠY --- */
    .container {
        position: relative;
        width: 90%; max-width: 380px;
        background: #111827;
        border-radius: 28px; padding: 35px 25px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        color: white; text-align: center;
    }

    /* HIỆU ỨNG LED RGB PHÁT SÁNG XOAY TRÒN QUANH KHUNG CHÍNH */
    .container::before {
        content: '';
        position: absolute;
        top: -3px; left: -3px; right: -3px; bottom: -3px;
        background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
        background-size: 400%;
        z-index: -1;
        filter: blur(8px);
        border-radius: 31px;
        animation: steam 20s linear infinite;
    }

    @keyframes steam {
        0% { background-position: 0 0; }
        50% { background-position: 400% 0; }
        100% { background-position: 0 0; }
    }

    /* CHỮ ĐỔI MÀU GRADIENT CẦU VỒNG */
    .title { 
        font-size: 28px; 
        font-weight: 600; 
        margin-bottom: 5px; 
        letter-spacing: 3px;
        background: linear-gradient(45deg, #ff0055, #00ffd5, #fffb00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .welcome-text { font-size: 14px; color: rgba(255, 255, 255, 0.7); margin-bottom: 25px; }
    .welcome-text span { color: #00ffd5; font-weight: 600; }
    
    /* --- CÁC NÚT CARD CHỌN CHỨC NĂNG --- */
    .card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px; padding: 20px; margin-bottom: 18px;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
    }
    .card h2 { font-size: 17px; font-weight: 500; letter-spacing: 1px; color: #fff; }
    
    /* Hover vào nút hiệu ứng cầu vồng neon sáng bừng */
    .card:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-4px) scale(1.02);
        border-color: #00ffd5;
        box-shadow: 0 0 15px rgba(0, 255, 213, 0.4);
    }

    /* NÚT ĐĂNG XUẤT NEON ĐỎ */
    .logout-btn {
        width: 100%; padding: 15px;
        border: 2px solid #ff3b30; border-radius: 14px;
        background: transparent; color: #ff3b30;
        font-size: 15px; font-weight: 600;
        cursor: pointer; transition: 0.3s;
    }
    .logout-btn:hover {
        background: #ff3b30; color: white;
        box-shadow: 0 0 20px rgba(255, 59, 48, 0.6);
    }
</style>
</head>
<body>

    <script>
        const loggedInUser = localStorage.getItem("loggedInUser");
        if (!loggedInUser) {
            alert("Bạn cần phải đăng nhập trước!");
            window.location.href = "đăng nhập.html"; 
        }
    </script>

    <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="sidebar" id="mySidebar">
        <a href="#">🏠 Trang chủ</a>
        <a href="#">👤 Thông tin cá nhân</a>
        <a href="#">⚙️ Cài đặt</a>
        <a href="#">🔔 Thông báo</a>
        <a href="#" onclick="logout()" style="color: #ff3b30; font-weight: 600;">🚪 Thoát hệ thống</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <div class="title">MENU CHÍNH</div>
        <div class="welcome-text">Xin chào, <span id="userDisplay">...</span> ✨</div>

        <a href="hoten.html" style="text-decoration: none; color: inherit;">
            <div class="card"><h2>HỌ TÊN 👤</h2></div>
        </a>

        <a href="songay.html" style="text-decoration: none; color: inherit;">
            <div class="card"><h2>SỐ NGÀY 📅</h2></div>
        </a>

        <a href="tinhyeu.html" style="text-decoration: none; color: inherit;">
            <div class="card"><h2>TÍNH TOÁN ❤️</h2></div>
        </a>

        <button class="logout-btn" onclick="logout()">Đăng xuất</button>
    </div>

    <script>
        if (loggedInUser) {
            document.getElementById("userDisplay").innerText = loggedInUser;
        }

        function toggleMenu() {
            const sidebar = document.getElementById("mySidebar");
            const overlay = document.getElementById("overlay");
            const menuBtn = document.getElementById("menuBtn");
            
            sidebar.classList.toggle("active");
            overlay.classList.toggle("active");
            menuBtn.classList.toggle("active");
        }

        function logout() {
            if (confirm("Bạn có chắc chắn muốn thoát hệ thống không?")) {
                localStorage.removeItem("loggedInUser");
                window.location.href = "đăng nhập.html"; 
            }
        }
    </script>
</body>
</html>
