<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Đăng Ký - Chidoi</title>
</head>
<body>
    <div class="welcome-container">
        <h1 class="logo">REGISTER</h1>
        
        <form id="registerForm">
            <input type="text" id="regUser" placeholder="Tên đăng nhập mới" required>
            <input type="email" id="regEmail" placeholder="Địa chỉ Email" required>
            <input type="password" id="regPass" placeholder="Mật khẩu mới (tối thiểu 6 ký tự)" required>
            <button type="submit" class="btn">Tạo Tài Khoản</button>
        </form>
        
        <p style="margin-top: 25px;">
            Đã có tài khoản? <a href="login.html" style="font-weight: bold; color: #00ffff;">Đăng nhập ngay</a>
        </p>
        <p style="margin-top: 10px;">
            <a href="index.html">← Quay lại trang chủ</a>
        </p>
    </div>

<!-- Nhúng thư viện Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // CẤU HÌNH FIREBASE CHÍNH XÁC CỦA BẠN
    const firebaseConfig = {
        apiKey: "AIzaSyB0EJxNNis2NB-JjsiihieWVzFYwsgvRi8",
        authDomain: "chidoi.firebaseapp.com",
        databaseURL: "https://chidoi-default-rtdb.firebaseio.com",
        projectId: "chidoi",
        storageBucket: "chidoi.appspot.com",
        messagingSenderId: "523119718926",
        appId: "1:523119718926:web:2dcdd49145b01755ed825f",
        measurementId: "G-RFKJHW3S97"
    };
    
    // Khởi tạo Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Xử lý sự kiện đăng ký tài khoản
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('regUser').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;

        if (pass.length < 6) {
            alert("Mật khẩu tối thiểu phải từ 6 ký tự!");
            return;
        }

        // Kiểm tra tài khoản trùng lặp trên Database
        database.ref('users/' + user).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                alert("Tên đăng nhập này đã có người sử dụng rồi!");
            } else {
                // Lưu vào Database thật
                database.ref('users/' + user).set({
                    username: user,
                    email: email,
                    password: pass
                }).then(() => {
                    alert("Đăng ký tài khoản và lưu vào Database thành công!");
                    window.location.href = "login.html";
                }).catch((error) => {
                    alert("Lỗi lưu dữ liệu: " + error.message);
                });
            }
        });
    });
</script>
    
</body>
</html>
