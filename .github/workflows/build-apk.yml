name: Build Web App to Universal APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Web Directory & Install Capacitor
        run: |
          mkdir -p www
          cp -r *.html *.css *.js www/ 2>/dev/null || true
          npm init -y
          npm install @capacitor/core@5.7.0 @capacitor/cli@5.7.0 @capacitor/android@5.7.0 @capacitor/assets --save-dev
          
          # Tao file config JSON truc tiep de tranh loi typescript/commonjs
          echo '{"appId":"com.anhsung.chidoi","appName":"Chidoi App","webDir":"www"}' > capacitor.config.json
          
          npx cap add android

          # Tu dong tao Icon neu co file icon.png
          if [ -f "icon.png" ]; then
            npx capacitor-assets generate --android
          fi

          cd android
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.0.2-all.zip/g' gradle/wrapper/gradle-wrapper.properties

      - name: Build APK Release
        run: |
          cd android
          sed -i 's/minSdkVersion = .*/minSdkVersion = 22/' variables.gradle 2>/dev/null || true
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK Release
        run: |
          keytool -genkey -v -keystore release.keystore -storepass chidoi123 -alias chidoikey -keypass chidoi123 -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Chidoi App,O=Chidoi,C=VN"
          
          # Dung apksigner neu co hoac jarsigner de ky file release
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore release.keystore -storepass chidoi123 android/app/build/outputs/apk/release/app-release-unsigned.apk chidoikey
          
          mv android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/ChidoiApp.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chidoi-app-release
          path: android/app/build/outputs/apk/release/ChidoiApp.apk
          
