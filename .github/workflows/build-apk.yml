name: Build Web App to APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Prepare Web Directory & Install Capacitor
        run: |
          mkdir -p www
          cp -r *.html *.css *.js www/ 2>/dev/null || true
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Chidoi App" "com.anhsung.chidoi" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chidoi-app-release
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
