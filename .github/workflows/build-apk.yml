name: Build Web App to Universal APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Prepare Web Directory & Install Capacitor
        run: |
          mkdir -p www
          cp -r *.html *.css *.js www/ 2>/dev/null || true
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Chidoi App" "com.anhsung.chidoi" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Android Compatibility (Min SDK & Universal ABI)
        run: |
          # Hạ min SDK xuống 22 (Android 5.1 trở lên) để chạy được trên cả máy Android rất cũ
          sed -i 's/minSdkVersion = .*/minSdkVersion = 22/' android/variables.gradle 2>/dev/null || true

      - name: Build APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chidoi-app-tat-ca-may-android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
